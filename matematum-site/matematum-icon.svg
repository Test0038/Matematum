<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
    <defs>
        <radialGradient id="bg" cx="50%" cy="-12%" r="135%">
            <stop offset="0%" stop-color="#2b3047"/>
            <stop offset="42%" stop-color="#15171f"/>
            <stop offset="100%" stop-color="#07080b"/>
        </radialGradient>
        <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
            <stop offset="30%" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>

        <linearGradient id="gPlus" gradientUnits="userSpaceOnUse" x1="0" y1="207" x2="0" y2="407">
            <stop offset="0%" stop-color="#7ab8ff"/>
            <stop offset="100%" stop-color="#0a7bff"/>
        </linearGradient>
        <linearGradient id="gMinus" gradientUnits="userSpaceOnUse" x1="0" y1="265" x2="0" y2="349">
            <stop offset="0%" stop-color="#86efab"/>
            <stop offset="100%" stop-color="#1fc15c"/>
        </linearGradient>
        <linearGradient id="gMul" gradientUnits="userSpaceOnUse" x1="0" y1="601" x2="0" y2="833">
            <stop offset="0%" stop-color="#ffb340"/>
            <stop offset="100%" stop-color="#ff5b3a"/>
        </linearGradient>
        <linearGradient id="gDiv" gradientUnits="userSpaceOnUse" x1="0" y1="591" x2="0" y2="843">
            <stop offset="0%" stop-color="#d9a8ff"/>
            <stop offset="100%" stop-color="#a14df0"/>
        </linearGradient>

        <radialGradient id="aPlus" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#1f8fff" stop-opacity="0.20"/>
            <stop offset="100%" stop-color="#1f8fff" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="aMinus" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#2bd368" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#2bd368" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="aMul" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ff7a3c" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#ff7a3c" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="aDiv" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#b35ef5" stop-opacity="0.20"/>
            <stop offset="100%" stop-color="#b35ef5" stop-opacity="0"/>
        </radialGradient>

        <filter id="blurGlow" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="24"/>
        </filter>
        <filter id="lift" x="-40%" y="-40%" width="180%" height="180%">
            <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
        </filter>
    </defs>

    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#sheen)"/>

    <!-- цветовая атмосфера за глифами -->
    <circle cx="307" cy="307" r="250" fill="url(#aPlus)"/>
    <circle cx="717" cy="307" r="250" fill="url(#aMinus)"/>
    <circle cx="307" cy="717" r="250" fill="url(#aMul)"/>
    <circle cx="717" cy="717" r="250" fill="url(#aDiv)"/>

    <!-- сложение -->
    <g filter="url(#blurGlow)" stroke="#1f8fff" stroke-width="88" stroke-linecap="round" opacity="0.5">
        <line x1="207" y1="307" x2="407" y2="307"/>
        <line x1="307" y1="207" x2="307" y2="407"/>
    </g>
    <g filter="url(#lift)" stroke="url(#gPlus)" stroke-width="68" stroke-linecap="round">
        <line x1="207" y1="307" x2="407" y2="307"/>
        <line x1="307" y1="207" x2="307" y2="407"/>
    </g>

    <!-- вычитание -->
    <g filter="url(#blurGlow)" stroke="#2bd368" stroke-width="88" stroke-linecap="round" opacity="0.5">
        <line x1="617" y1="307" x2="817" y2="307"/>
    </g>
    <g filter="url(#lift)" stroke="url(#gMinus)" stroke-width="68" stroke-linecap="round">
        <line x1="617" y1="307" x2="817" y2="307"/>
    </g>

    <!-- умножение -->
    <g filter="url(#blurGlow)" stroke="#ff7a3c" stroke-width="88" stroke-linecap="round" opacity="0.5">
        <line x1="225" y1="635" x2="389" y2="799"/>
        <line x1="389" y1="635" x2="225" y2="799"/>
    </g>
    <g filter="url(#lift)" stroke="url(#gMul)" stroke-width="68" stroke-linecap="round">
        <line x1="225" y1="635" x2="389" y2="799"/>
        <line x1="389" y1="635" x2="225" y2="799"/>
    </g>

    <!-- деление -->
    <g filter="url(#blurGlow)" opacity="0.5">
        <line x1="617" y1="717" x2="817" y2="717" stroke="#b35ef5" stroke-width="88" stroke-linecap="round"/>
        <circle cx="717" cy="627" r="44" fill="#b35ef5"/>
        <circle cx="717" cy="807" r="44" fill="#b35ef5"/>
    </g>
    <g filter="url(#lift)">
        <line x1="617" y1="717" x2="817" y2="717" stroke="url(#gDiv)" stroke-width="68" stroke-linecap="round"/>
        <circle cx="717" cy="627" r="36" fill="url(#gDiv)"/>
        <circle cx="717" cy="807" r="36" fill="url(#gDiv)"/>
    </g>
</svg>
